---
jobs:
  update-pkgbuild:
    if: '!github.event.release.draft && !github.event.release.prerelease'
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          TAG="$TAG_NAME"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Checkout MINGW-packages repository
        uses: actions/checkout@v6
        with:
          repository: msys2/MINGW-packages
          token: ${{ secrets.MSYS2_TOKEN }}
      - name: Configure git
        run: |
          git config user.name "Andrew Udvare"
          git config user.email "audvare@gmail.com"
      - name: Update PKGBUILD
        run: |
          git remote add upstream https://github.com/msys2/MINGW-packages.git
          git fetch upstream
          git checkout master
          git reset --hard upstream/master
          VERSION="${{ steps.version.outputs.version }}"
          cd mingw-w64-kate-wakatime
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          NEW_SUM=$(curl -L "https://github.com/Tatsh/kate-wakatime/archive/refs/tags/v${VERSION}.tar.gz" | sha256sum | awk '{print $1}')
          sed -i "s/^sha256sums=.*/sha256sums=('${NEW_SUM}')/" PKGBUILD
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          base: master
          branch: kate-wakatime-${{ steps.version.outputs.version }}
          commit-message: 'mingw-w64-kate-wakatime: update to ${{ steps.version.outputs.version }}'
          title: 'mingw-w64-kate-wakatime: update to ${{ steps.version.outputs.version }}'
          token: ${{ secrets.MSYS2_TOKEN }}
          body: |
            This PR was automatically created from the [kate-wakatime ${{ steps.version.outputs.tag }} release](${{ github.event.release.html_url }}).
          push-to-fork: Tatsh/MINGW-packages
name: Update MSYS2 PKGBUILD
'on':
  release:
    types:
      - 'published'
